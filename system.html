<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">// Scroll-driven model rotation
const mv = document.getElementById('simulator-model');
let currentYaw = 0, targetYaw = 0;
window.addEventListener('scroll', () => {
  const scrollPct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  targetYaw = scrollPct * 360;
});
(function animateModel(){
  currentYaw += (targetYaw - currentYaw) * 0.05;
  if(mv) mv.setAttribute('orientation', `0deg ${currentYaw}deg 0deg`);
  requestAnimationFrame(animateModel);
})();
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#050D47;--navy2:#0F1A61;--gold:#F2C726;--green:#33C759;--orange:#FF991A;
  --red:#F24040;--cyan:#06B6D4;--purple:#A855F7;--blue:#3B82F6;--text:#E8EEFF;--muted:#8A96C8;

html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--text);font-family:'Work Sans',sans-serif;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:21px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(5,13,71,0.85);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.08);overflow:visible}
.logo{display:flex;align-items:center;text-decoration:none;height:41px;overflow:visible}
.logo svg{height:166px;width:auto;display:block;flex-shrink:0}
.nav-links{display:flex;gap:37px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:15px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-cta{display:flex;align-items:center;gap:9px;background:#fff;color:var(--navy);padding:10px 25px;border-radius:6px;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:background .2s,color .2s}
.nav-cta:hover{background:var(--gold);color:var(--navy)}
.nav-cta-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* HERO */
.page-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#020820 0%,#050D47 50%,#0a1560 100%);position:relative;overflow:hidden;text-align:center;padding:120px 5% 80px}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.hero-glow{position:absolute;top:10%;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(6,182,212,.07) 0%,transparent 70%);z-index:0}

/* model sits behind text */
.hero-model-wrap{position:absolute;inset:0;z-index:1;pointer-events:none}
model-viewer{
  width:100%;
  height:100%;
  background:transparent;
  --poster-color:transparent;
}

.page-hero-content{position:relative;z-index:2;max-width:760px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);padding:7px 16px;border-radius:100px;font-size:12px;color:#fff;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px}
.hero-badge-dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:pulse 2s infinite}
h1{font-family:'Montserrat',sans-serif;font-size:clamp(36px,5vw,64px);font-weight:800;line-height:1.1;color:#fff;margin-bottom:16px;text-shadow:0 2px 40px rgba(2,8,32,.8)}
h1 span{color:var(--cyan)}
.hero-sub{font-size:clamp(14px,1.8vw,18px);color:var(--muted);line-height:1.7;max-width:580px;margin:0 auto}

/* scroll hint */
.scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.6}
.scroll-hint span{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.scroll-arrow{width:20px;height:20px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);animation:bounce 1.6s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(5px)}}

/* SPECS GRID */
.specs-section{padding:80px 5%;background:var(--navy2);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.specs-inner{max-width:1100px;margin:0 auto}
.section-label{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
h2{font-family:'Montserrat',sans-serif;font-size:clamp(26px,3.5vw,42px);font-weight:800;line-height:1.15;margin-bottom:16px;color:#fff}
.body-text{color:var(--muted);line-height:1.8;font-size:15px}
.body-text strong{color:var(--text)}
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px}
.spec-card{background:var(--navy);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:24px;transition:transform .25s,border-color .25s}
.spec-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.18)}
.spec-card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.spec-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.spec-card h3{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:#fff}
.spec-card p{font-size:13px;color:var(--muted);line-height:1.6}

/* FEATURE ROW */
.features-section{padding:80px 5%;background:var(--navy)}
.features-inner{max-width:1100px;margin:0 auto}
.feature-row{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:80px}
.feature-row:last-child{margin-bottom:0}
.feature-row.reverse{direction:rtl}
.feature-row.reverse>*{direction:ltr}
.feature-visual{background:var(--navy2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.feature-visual::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.feature-visual.cv::before{background:linear-gradient(90deg,var(--cyan),var(--blue))}
.feature-visual.gv::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.feature-visual.ov::before{background:linear-gradient(90deg,var(--orange),var(--gold))}
.feature-list{list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:20px}
.feature-list li{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--muted);line-height:1.6}
.feature-list li::before{content:"✦";color:var(--cyan);flex-shrink:0;margin-top:2px;font-size:10px}
.stat-big{font-family:'Montserrat',sans-serif;font-size:52px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-big.cyan{color:var(--cyan)}
.stat-big.green{color:var(--green)}
.stat-big.gold{color:var(--gold)}

/* CTA */
.cta-section{padding:80px 5%;background:linear-gradient(135deg,rgba(6,182,212,.06),rgba(168,85,247,.06));border-top:1px solid rgba(255,255,255,.06);text-align:center}
.btn-primary{background:#fff;color:var(--navy);padding:14px 36px;border-radius:8px;font-weight:700;font-size:14px;letter-spacing:.5px;text-decoration:none;display:inline-block;transition:transform .2s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,255,255,.15)}

.gradient-line{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);margin:0 5%}

/* PILL */
.pill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.pill{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.5px}
.pill-cyan{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
.pill-green{background:rgba(51,199,89,.15);color:var(--green);border:1px solid rgba(51,199,89,.25)}
.pill-gold{background:rgba(242,199,38,.12);color:var(--gold);border:1px solid rgba(242,199,38,.2)}
.pill-white{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}

@media(max-width:900px){
  nav .nav-links{display:none}
  .specs-grid{grid-template-columns:1fr 1fr}
  .feature-row,.feature-row.reverse{grid-template-columns:1fr;direction:ltr}
  model-viewer{height:400px}
}
@media(max-width:600px){

  footer{flex-direction:column;gap:16px;text-align:center}
